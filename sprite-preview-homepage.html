<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sprite Preview — Homepage</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Courier New',monospace;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{text-align:center;color:#ffd060;margin-bottom:6px;font-size:1.3em}
.subtitle{text-align:center;color:#aaa;margin-bottom:16px;font-size:.8em}
.mode-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
.mode-btn{background:#2a2a3e;border:2px solid #444;color:#e0e0e0;padding:8px 20px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85em;transition:all .15s}
.mode-btn:hover{border-color:#ffd060;background:#3a3a4e}
.mode-btn.active{border-color:#ffd060;background:#ffd060;color:#1a1a2e;font-weight:bold}
.sprite-selector{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.sp-btn{background:#2a2a3e;border:2px solid #444;color:#e0e0e0;padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:.7em;transition:all .15s}
.sp-btn:hover{border-color:#ffd060}
.sp-btn.active{border-color:#ffd060;background:#ffd060;color:#1a1a2e;font-weight:bold}
.layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.scene-wrap{position:relative;border:3px solid #ffd060;border-radius:8px;overflow:hidden;background:#000;flex-shrink:0}
.scene-wrap{width:600px;max-width:90vw;aspect-ratio:1/1}
.scene-bg{width:100%;height:100%;object-fit:contain;display:block}
.mini-sprite{position:absolute;aspect-ratio:1;background-repeat:no-repeat;image-rendering:pixelated;border:2px dashed transparent;transition:border-color .2s}
.mini-sprite.selected{border-color:rgba(255,208,96,.8);border-radius:4px}
.right-panel{display:flex;flex-direction:column;gap:12px;min-width:280px}
.controls{display:flex;gap:10px;flex-wrap:wrap}
.ctrl-group{background:#2a2a3e;padding:10px 14px;border-radius:6px;border:1px solid #444;flex:1;min-width:120px}
.ctrl-group label{display:block;margin-bottom:3px;font-size:.75em;color:#aaa}
.ctrl-group input[type=range]{width:100%}
.ctrl-group .val{color:#ffd060;font-weight:bold}
.btn{background:#ffd060;color:#1a1a2e;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:bold;margin:0 3px;font-size:.8em}
.btn:hover{background:#ffed4a}
.output-box{background:#0d0d1a;border:1px solid #444;border-radius:6px;padding:12px;font-size:.72em;color:#ffd060;margin-top:8px;user-select:all;cursor:pointer;white-space:pre-wrap;line-height:1.8}
.output-box:hover{border-color:#ffd060}
.output-label{font-size:.7em;color:#888;margin-bottom:4px}
.info-bar{background:#2a2a3e;padding:8px 14px;border-radius:6px;border:1px solid #444;font-size:.75em;color:#aaa;text-align:center}
</style>
</head>
<body>

<h1>Sprite Preview — Homepage</h1>
<p class="subtitle">Position mini sprites on the factory overview</p>

<p class="subtitle" style="font-size:.7em;color:#888;margin-bottom:8px">Positions are relative to the 1:1 factory image — works on all screen sizes</p>

<div class="sprite-selector" id="sprite-selector"></div>
<div class="info-bar" id="info-bar">Select a sprite to adjust</div>

<div class="layout">
  <div class="scene-wrap" id="scene-wrap">
    <img class="scene-bg" id="scene-bg" src="images/Game Canvas Background.webp" alt="Factory"/>
    <!-- Mini sprites will be created by JS -->
  </div>

  <div class="right-panel">
    <div class="controls">
      <div class="ctrl-group">
        <label>Left: <span class="val" id="left-val">0</span>%</label>
        <input type="range" id="left-slider" min="-10" max="100" value="0" step="0.1"/>
      </div>
      <div class="ctrl-group">
        <label>Top: <span class="val" id="top-val">0</span>%</label>
        <input type="range" id="top-slider" min="-10" max="100" value="0" step="0.1"/>
      </div>
      <div class="ctrl-group">
        <label>Width: <span class="val" id="scale-val">10</span>%</label>
        <input type="range" id="scale-slider" min="2" max="30" value="10" step="0.5"/>
      </div>
    </div>

    <div>
      <p class="output-label">All CSS values (click to copy):</p>
      <div class="output-box" id="css-output" onclick="copyCSS()">Select a sprite...</div>
    </div>
  </div>
</div>

<script>
'use strict';

const SPRITES = [
  { id: 'cat',      name: 'Cat',      frames: 12, sprite: 'images/Station 1 sprite.png',
    pos: { left: 22.9, top: 42.5, width: 8 }
  },
  { id: 'cockatoo', name: 'Cockatoo', frames: 12, sprite: 'images/Station 2 sprite.png',
    pos: { left: 34.9, top: 45.4, width: 8 }
  },
  { id: 'bulldog',  name: 'Bulldog',  frames: 12, sprite: 'images/Station 3 sprite.png',
    pos: { left: 53.9, top: 40.1, width: 10.5 }
  },
  { id: 'otter',    name: 'Otter',    frames: 12, sprite: 'images/Station 4 sprite.png',
    pos: { left: 64.7, top: 35, width: 13.5 }
  },
  { id: 'rabbit',   name: 'Rabbit',   frames: 12, sprite: 'images/Station 5 sprite.png',
    pos: { left: 93.3, top: 35.8, width: 9 }
  }
];

let selected = 0;
let spriteEls = [];

const sceneWrap = document.getElementById('scene-wrap');
const sceneBg = document.getElementById('scene-bg');
const leftSlider = document.getElementById('left-slider');
const topSlider = document.getElementById('top-slider');
const scaleSlider = document.getElementById('scale-slider');
const leftVal = document.getElementById('left-val');
const topVal = document.getElementById('top-val');
const scaleVal = document.getElementById('scale-val');
const cssOutput = document.getElementById('css-output');
const infoBar = document.getElementById('info-bar');
const selector = document.getElementById('sprite-selector');

// Build sprite selector buttons
SPRITES.forEach((s, i) => {
  const btn = document.createElement('button');
  btn.className = 'sp-btn' + (i === 0 ? ' active' : '');
  btn.textContent = s.name;
  btn.onclick = () => selectSprite(i);
  selector.appendChild(btn);
});

function buildSprites() {
  // Remove old sprites
  spriteEls.forEach(el => el.remove());
  spriteEls = [];

  SPRITES.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'mini-sprite' + (i === selected ? ' selected' : '');
    el.style.backgroundImage = `url('${s.sprite}')`;
    el.style.backgroundSize = `${s.frames * 100}% 100%`;
    el.style.imageRendering = s.id === 'cockatoo' ? 'auto' : 'pixelated';
    el.onclick = () => selectSprite(i);
    el.style.cursor = 'pointer';
    sceneWrap.appendChild(el);
    spriteEls.push(el);
  });

  positionAllSprites();
}

function positionAllSprites() {
  SPRITES.forEach((s, i) => {
    const pos = s.pos;
    const el = spriteEls[i];
    if (!el) return;
    el.style.left = pos.left + '%';
    el.style.top = pos.top + '%';
    el.style.width = pos.width + '%';
  });
}

function selectSprite(i) {
  selected = i;
  const s = SPRITES[i];
  const pos = s.pos;

  // Update selector buttons
  document.querySelectorAll('.sp-btn').forEach((b, j) => b.classList.toggle('active', j === i));
  spriteEls.forEach((el, j) => el.classList.toggle('selected', j === i));

  // Update sliders
  leftSlider.value = pos.left;
  topSlider.value = pos.top;
  scaleSlider.value = pos.width;
  updateLabels();

  infoBar.textContent = `${s.name} — ${s.frames} frames`;
}

function updateLabels() {
  leftVal.textContent = parseFloat(leftSlider.value).toFixed(1);
  topVal.textContent = parseFloat(topSlider.value).toFixed(1);
  scaleVal.textContent = parseFloat(scaleSlider.value).toFixed(1);
  updateCSS();
}

function updateCSS() {
  let lines = [];
  SPRITES.forEach(s => {
    const p = s.pos;
    lines.push(`.ms-${s.id}{left:${p.left}%;top:${p.top}%;width:${p.width}%}`);
  });
  cssOutput.textContent = lines.join('\n');
}

function copyCSS() {
  navigator.clipboard.writeText(cssOutput.textContent).then(() => {
    const orig = cssOutput.style.borderColor;
    cssOutput.style.borderColor = '#00ff41';
    setTimeout(() => cssOutput.style.borderColor = orig, 600);
  });
}


// Slider events
[leftSlider, topSlider, scaleSlider].forEach(sl => {
  sl.addEventListener('input', () => {
    const s = SPRITES[selected];
    s.pos.left = parseFloat(leftSlider.value);
    s.pos.top = parseFloat(topSlider.value);
    s.pos.width = parseFloat(scaleSlider.value);
    positionAllSprites();
    updateLabels();
  });
});

// Sprite animation
let frame = 0;
function animateSprites() {
  frame++;
  spriteEls.forEach((el, i) => {
    const s = SPRITES[i];
    const w = Math.round(el.offsetWidth);
    el.style.backgroundSize = `${w * s.frames}px auto`;
    el.style.backgroundPosition = `${-(frame % s.frames) * w}px 0`;
  });
}
setInterval(animateSprites, 1000 / 7);

// Handle resize
window.addEventListener('resize', () => { positionAllSprites(); animateSprites(); });

// Init
buildSprites();
selectSprite(0);
</script>

</body>
</html>
