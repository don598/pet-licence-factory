# ── Pet Licence Factory — Netlify Config ──────────────────────

[build]
  publish   = "public"
  functions = "netlify/functions"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://checkout.stripe.com https://cdn.jsdelivr.net https://staticimgly.com https://huggingface.co https://*.huggingface.co; frame-src https://checkout.stripe.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Admin pages — prevent search engines indexing them
[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/command-station.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache images aggressively
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
