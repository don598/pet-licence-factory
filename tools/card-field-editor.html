<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PLF Card Field Alignment Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Sacramento&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
  --border: #2a2a2a; --text: #f0f0f0; --muted: #888;
  --accent: #f0c050; --accent2: #c8922a; --green: #22c55e;
  --red: #ef4444; --blue: #3b82f6;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 13px; overflow: hidden; }

.layout { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 320px; flex-shrink: 0; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  overflow: hidden;
}
.sidebar-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--accent);
}
.sidebar-header span { display: block; font-family: 'Inter', sans-serif; font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: normal; }

.field-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.field-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 12px; cursor: pointer; transition: background .1s;
  border-left: 3px solid transparent;
}
.field-item:hover { background: var(--surface2); }
.field-item.active { background: var(--surface2); border-left-color: var(--accent); }
.field-item .color-dot {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  border: 1px solid rgba(255,255,255,.15);
}
.field-item .field-name { font-size: 12px; font-weight: 500; flex: 1; }
.field-item .field-coords { font-size: 10px; color: var(--muted); font-family: monospace; }

/* ── Properties panel ── */
.props-panel {
  border-top: 1px solid var(--border); padding: 12px; flex-shrink: 0;
}
.props-title { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; font-weight: 600; }
.props-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.prop-field { display: flex; flex-direction: column; gap: 3px; }
.prop-field label { font-size: 10px; color: var(--muted); }
.prop-field input {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-size: 12px; padding: 5px 8px; outline: none;
  font-family: monospace; width: 100%;
}
.prop-field input:focus { border-color: var(--accent2); }

/* ── Actions ── */
.actions-bar {
  padding: 10px 12px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0;
}
.btn {
  flex: 1; padding: 8px; border: none; border-radius: 5px;
  font-family: 'Press Start 2P', monospace; font-size: 7px; cursor: pointer;
  transition: all .15s; text-align: center;
}
.btn-accent { background: var(--accent2); color: var(--bg); }
.btn-accent:hover { background: var(--accent); }
.btn-green { background: rgba(34,197,94,.15); color: var(--green); border: 1px solid var(--green); }
.btn-green:hover { background: rgba(34,197,94,.25); }
.btn-blue { background: rgba(59,130,246,.15); color: var(--blue); border: 1px solid var(--blue); }
.btn-blue:hover { background: rgba(59,130,246,.25); }

/* ── Canvas area ── */
.canvas-area {
  flex: 1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative; background: #080808;
}
.canvas-wrap {
  position: relative; box-shadow: 0 8px 40px rgba(0,0,0,.5);
  border: 1px solid var(--border);
}
.canvas-wrap canvas { display: block; }

/* ── Info bar ── */
.info-bar {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(20,20,20,.9); border: 1px solid var(--border);
  border-radius: 6px; padding: 6px 14px; font-size: 11px; color: var(--muted);
  display: flex; gap: 16px; pointer-events: none;
}
.info-bar b { color: var(--text); }

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 16px; font-size: 12px; color: var(--text);
  transform: translateY(80px); opacity: 0; transition: all .25s; pointer-events: none;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast.ok { border-left: 3px solid var(--green); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      FIELD ALIGNMENT EDITOR
      <span>Drag fields on the card to reposition. Template: Blank Card.png (1322x957)</span>
    </div>
    <div class="field-list" id="field-list"></div>

    <div class="props-panel" id="props-panel" style="display:none">
      <div class="props-title">Selected Field: <span id="props-name" style="color:var(--accent)"></span></div>
      <div class="props-grid">
        <div class="prop-field"><label>X</label><input type="number" id="prop-x" /></div>
        <div class="prop-field"><label>Y</label><input type="number" id="prop-y" /></div>
        <div class="prop-field"><label>Width</label><input type="number" id="prop-w" /></div>
        <div class="prop-field"><label>Height</label><input type="number" id="prop-h" /></div>
      </div>
    </div>

    <div class="actions-bar">
      <button class="btn btn-accent" onclick="resetAll()">RESET</button>
      <button class="btn btn-green" onclick="copyJSON()">COPY JSON</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-wrap">
      <canvas id="editor-canvas"></canvas>
    </div>
    <div class="info-bar" id="info-bar">
      <span>Template: <b>1322 x 957</b></span>
      <span>Mouse: <b id="mouse-pos">—</b></span>
      <span>Zoom: <b id="zoom-level">—</b></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

// ── Template dimensions ──
const TW = 1322, TH = 957;

// ── Field definitions (starting positions from current command-station.html) ──
const FIELD_COLORS = {
  dlNumber:  '#e74c3c', expDate:  '#e67e22', issDate:  '#f1c40f',
  dob:       '#2ecc71', firstName:'#3498db', lastName: '#9b59b6',
  addrLine1: '#1abc9c', addrLine2:'#16a085', signature:'#e91e63',
  height:    '#ff9800', sex:      '#00bcd4', weight:   '#8bc34a',
  eyes:      '#ff5722', licClass: '#607d8b', restrict: '#795548',
  photoMain: '#2196f3',
  photoWmark:'#9c27b0',
};

const DEFAULTS = {
  dlNumber:  { x: 439, y: 197, w: 257, h: 61 },
  expDate:   { x: 719, y: 200, w: 243, h: 41 },
  issDate:   { x: 719, y: 241, w: 243, h: 41 },
  dob:       { x: 472, y: 263, w: 189, h: 60 },
  firstName: { x: 374, y: 333, w: 345, h: 80 },
  lastName:  { x: 374, y: 413, w: 345, h: 79 },
  addrLine1: { x: 374, y: 531, w: 325, h: 41 },
  addrLine2: { x: 374, y: 572, w: 325, h: 41 },
  signature: { x: 1027, y: 591, w: 176, h: 64 },
  height:    { x: 747, y: 625, w: 109, h: 48 },
  sex:       { x: 435, y: 626, w: 65,  h: 48 },
  weight:    { x: 496, y: 683, w: 53,  h: 47 },
  eyes:      { x: 718, y: 683, w: 76,  h: 47 },
  licClass:  { x: 476, y: 737, w: 62,  h: 48 },
  restrict:  { x: 856, y: 737, w: 71,  h: 48 },
  photoMain: { x: 971, y: 222, w: 285, h: 433 },
  photoWmark:{ x: 62,  y: 834, w: 138, h: 120 },
};

// Sample text for each field
const SAMPLE_TEXT = {
  dlNumber: 'P5529031', expDate: '11/03/31', issDate: '11/03/26',
  dob: '11/03/21', firstName: 'Oliver', lastName: 'Pawsley',
  addrLine1: '12 Whisker Way', addrLine2: 'Furton, NY 10001',
  signature: 'Oliver Pawsley', height: '12"', sex: 'M',
  weight: '11', eyes: 'BLU', licClass: 'A', restrict: 'NONE',
  photoMain: '',
  photoWmark: '',
};

// Working copy
let fields = {};
for (const k of Object.keys(DEFAULTS)) {
  fields[k] = { ...DEFAULTS[k] };
}

// Try to restore from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('plf_card_fields'));
  if (saved) for (const k of Object.keys(saved)) {
    if (fields[k]) Object.assign(fields[k], saved[k]);
  }
} catch {}

// ── State ──
let selectedField = null;
let dragging = null; // { key, mode: 'move'|'resize', startX, startY, origField }
let templateImg = null;
let scale = 1;

const canvas = document.getElementById('editor-canvas');
const ctx = canvas.getContext('2d');

// ── Load template ──
function loadTemplate() {
  const img = new Image();
  img.onload = () => {
    templateImg = img;
    fitCanvas();
    render();
  };
  img.onerror = () => alert('Could not load Blank Card.png — make sure you are serving from the project root');
  // Try multiple paths depending on how the server is configured
  img.src = '../public/images/Blank Card.png';
}

function fitCanvas() {
  const area = document.getElementById('canvas-area');
  const maxW = area.clientWidth - 40;
  const maxH = area.clientHeight - 60;
  scale = Math.min(maxW / TW, maxH / TH, 1);
  canvas.width = Math.round(TW * scale);
  canvas.height = Math.round(TH * scale);
  document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
}

// ── Render ──
function render() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Draw template
  if (templateImg) {
    ctx.drawImage(templateImg, 0, 0, w, h);
  } else {
    ctx.fillStyle = '#ddd';
    ctx.fillRect(0, 0, w, h);
  }

  // Draw fields
  for (const [key, f] of Object.entries(fields)) {
    const sx = f.x * scale, sy = f.y * scale;
    const sw = f.w * scale, sh = f.h * scale;
    const color = FIELD_COLORS[key] || '#fff';
    const isSelected = key === selectedField;

    // Fill
    ctx.fillStyle = color + (isSelected ? '40' : '25');
    ctx.fillRect(sx, sy, sw, sh);

    // Border
    ctx.strokeStyle = color;
    ctx.lineWidth = isSelected ? 2.5 : 1;
    ctx.setLineDash(isSelected ? [] : [4, 3]);
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.setLineDash([]);

    // Label
    ctx.font = `${Math.max(9, Math.round(10 * scale))}px Inter, sans-serif`;
    ctx.fillStyle = color;
    ctx.textBaseline = 'bottom';
    ctx.fillText(key, sx + 2, sy - 2);

    // Sample text inside
    if (key === 'photoMain' || key === 'photoWmark') {
      // Draw photo placeholder
      const isWmark = key === 'photoWmark';
      ctx.globalAlpha = isWmark ? 0.2 : 1;
      ctx.fillStyle = '#333';
      ctx.fillRect(sx + 2, sy + 2, sw - 4, sh - 4);
      ctx.fillStyle = '#888';
      ctx.font = `${Math.max(8, Math.round((isWmark ? 10 : 14) * scale))}px Inter, sans-serif`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(isWmark ? 'WMARK 20%' : 'PHOTO', sx + sw / 2, sy + sh / 2);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    } else if (key === 'signature') {
      ctx.font = `${Math.min(Math.round(f.h * 0.55 * scale), 28)}px Sacramento, cursive`;
      ctx.fillStyle = '#1a0a00';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(SAMPLE_TEXT[key], sx + sw / 2, sy + sh / 2);
      ctx.textAlign = 'left';
    } else {
      const text = SAMPLE_TEXT[key] || key;
      let fs = Math.round(f.h * 0.55 * scale);
      ctx.font = `${fs}px 'Press Start 2P', monospace`;
      while (fs > 6 && ctx.measureText(text).width > sw - 4) {
        fs--;
        ctx.font = `${fs}px 'Press Start 2P', monospace`;
      }
      ctx.fillStyle = key === 'dob' ? '#c0200a' : '#1a0a00';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, sx + 3, sy + sh / 2);
    }

    // Resize handle (bottom-right corner)
    if (isSelected) {
      ctx.fillStyle = color;
      ctx.fillRect(sx + sw - 6, sy + sh - 6, 6, 6);
    }
  }
}

// ── Field list ──
function buildFieldList() {
  const list = document.getElementById('field-list');
  list.innerHTML = '';
  for (const key of Object.keys(fields)) {
    const f = fields[key];
    const item = document.createElement('div');
    item.className = 'field-item' + (key === selectedField ? ' active' : '');
    item.dataset.key = key;
    item.innerHTML = `
      <div class="color-dot" style="background:${FIELD_COLORS[key]}"></div>
      <div class="field-name">${key}</div>
      <div class="field-coords">${f.x},${f.y} ${f.w}x${f.h}</div>
    `;
    item.addEventListener('click', () => selectField(key));
    list.appendChild(item);
  }
}

function selectField(key) {
  selectedField = key;
  buildFieldList();
  updateProps();
  render();
}

function updateProps() {
  const panel = document.getElementById('props-panel');
  if (!selectedField) { panel.style.display = 'none'; return; }
  panel.style.display = 'block';
  document.getElementById('props-name').textContent = selectedField;
  const f = fields[selectedField];
  document.getElementById('prop-x').value = f.x;
  document.getElementById('prop-y').value = f.y;
  document.getElementById('prop-w').value = f.w;
  document.getElementById('prop-h').value = f.h;
}

// Props input handlers
for (const prop of ['x', 'y', 'w', 'h']) {
  document.getElementById('prop-' + prop).addEventListener('input', (e) => {
    if (!selectedField) return;
    const val = parseInt(e.target.value) || 0;
    fields[selectedField][prop] = val;
    save();
    buildFieldList();
    render();
  });
}

// ── Mouse events for drag/resize ──
function canvasToTemplate(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) / scale,
    y: (e.clientY - rect.top) / scale,
  };
}

function hitTest(mx, my) {
  // Check selected field resize handle first
  if (selectedField) {
    const f = fields[selectedField];
    if (mx >= f.x + f.w - 10 && mx <= f.x + f.w + 4 &&
        my >= f.y + f.h - 10 && my <= f.y + f.h + 4) {
      return { key: selectedField, mode: 'resize' };
    }
  }
  // Check all fields (reverse order for z-priority)
  const keys = Object.keys(fields).reverse();
  for (const key of keys) {
    const f = fields[key];
    if (mx >= f.x && mx <= f.x + f.w && my >= f.y && my <= f.y + f.h) {
      return { key, mode: 'move' };
    }
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const { x, y } = canvasToTemplate(e);
  const hit = hitTest(x, y);
  if (!hit) { selectField(null); return; }

  selectField(hit.key);
  dragging = {
    key: hit.key,
    mode: hit.mode,
    startX: x,
    startY: y,
    origField: { ...fields[hit.key] },
  };
  canvas.style.cursor = hit.mode === 'resize' ? 'nwse-resize' : 'move';
});

canvas.addEventListener('mousemove', (e) => {
  const { x, y } = canvasToTemplate(e);
  document.getElementById('mouse-pos').textContent = `${Math.round(x)}, ${Math.round(y)}`;

  if (!dragging) {
    const hit = hitTest(x, y);
    canvas.style.cursor = hit ? (hit.mode === 'resize' ? 'nwse-resize' : 'move') : 'default';
    return;
  }

  const dx = Math.round(x - dragging.startX);
  const dy = Math.round(y - dragging.startY);
  const f = fields[dragging.key];
  const o = dragging.origField;

  if (dragging.mode === 'move') {
    f.x = Math.max(0, Math.min(TW - f.w, o.x + dx));
    f.y = Math.max(0, Math.min(TH - f.h, o.y + dy));
  } else {
    f.w = Math.max(20, o.w + dx);
    f.h = Math.max(10, o.h + dy);
  }

  updateProps();
  buildFieldList();
  render();
});

canvas.addEventListener('mouseup', () => {
  if (dragging) save();
  dragging = null;
  canvas.style.cursor = 'default';
});

canvas.addEventListener('mouseleave', () => {
  if (dragging) save();
  dragging = null;
});

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (!selectedField) return;
  if (document.activeElement.tagName === 'INPUT') return;

  const step = e.shiftKey ? 10 : 1;
  const f = fields[selectedField];

  switch (e.key) {
    case 'ArrowLeft':  f.x -= step; break;
    case 'ArrowRight': f.x += step; break;
    case 'ArrowUp':    f.y -= step; break;
    case 'ArrowDown':  f.y += step; break;
    default: return;
  }
  e.preventDefault();
  save();
  updateProps();
  buildFieldList();
  render();
});

// ── Save / Load / Copy ──
function save() {
  localStorage.setItem('plf_card_fields', JSON.stringify(fields));
}

function resetAll() {
  for (const k of Object.keys(DEFAULTS)) {
    fields[k] = { ...DEFAULTS[k] };
  }
  localStorage.removeItem('plf_card_fields');
  selectedField = null;
  buildFieldList();
  updateProps();
  render();
  showToast('Reset to defaults');
}

function copyJSON() {
  // Format as the JS const used in command-station.html
  let out = 'const F = {\n';
  for (const [key, f] of Object.entries(fields)) {
    const pad = ' '.repeat(Math.max(0, 10 - key.length));
    out += `  ${key}:${pad} { x: ${f.x}, y: ${f.y}, w: ${f.w}, h: ${f.h} },\n`;
  }
  out += '};';

  navigator.clipboard.writeText(out).then(() => {
    showToast('Copied! Paste into command-station.html');
  }).catch(() => {
    // Fallback: show in prompt
    prompt('Copy this:', out);
  });
}

// ── Toast ──
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ok';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.className = '', 2500);
}

// ── Resize handling ──
window.addEventListener('resize', () => {
  fitCanvas();
  render();
});

// ── Boot ──
buildFieldList();
loadTemplate();
</script>
</body>
</html>
