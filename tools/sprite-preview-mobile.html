<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Sprite Preview — Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Courier New',monospace;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{text-align:center;color:#ff6600;margin-bottom:6px;font-size:1.3em}
.subtitle{text-align:center;color:#aaa;margin-bottom:16px;font-size:.8em}
.selector{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px}
.sel-btn{background:#2a2a3e;border:2px solid #444;color:#e0e0e0;padding:8px 16px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.8em;transition:all .15s}
.sel-btn:hover{border-color:#ff6600;background:#3a3a4e}
.sel-btn.active{border-color:#ff6600;background:#ff6600;color:#1a1a2e;font-weight:bold}
.layout{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;justify-content:center}
.scene-wrap{position:relative;width:320px;aspect-ratio:9/16;border:3px solid #ff6600;border-radius:8px;overflow:hidden;background:#000;flex-shrink:0}
.scene-bg{width:100%;height:100%;object-fit:cover;display:block}
.sprite-anim{position:absolute;image-rendering:pixelated}
.right-panel{display:flex;flex-direction:column;gap:12px;min-width:280px}
.controls{display:flex;gap:10px;flex-wrap:wrap}
.ctrl-group{background:#2a2a3e;padding:10px 14px;border-radius:6px;border:1px solid #444;flex:1;min-width:120px}
.ctrl-group label{display:block;margin-bottom:3px;font-size:.75em;color:#aaa}
.ctrl-group input[type=range]{width:100%}
.ctrl-group .val{color:#ff6600;font-weight:bold}
.btn{background:#ff6600;color:#1a1a2e;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:bold;margin:0 3px;font-size:.8em}
.btn:hover{background:#ff8833}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.info{text-align:center;color:#888;font-size:.75em;margin-bottom:12px}
.frames-row{display:flex;gap:6px;flex-wrap:wrap}
.frame-thumb{width:70px;height:70px;border:2px solid #444;border-radius:4px;cursor:pointer;image-rendering:pixelated;background:repeating-conic-gradient(#333 0% 25%,#222 0% 50%) 0 0/12px 12px}
.frame-thumb.active{border-color:#ff6600}
.output-box{background:#0d0d1a;border:1px solid #444;border-radius:6px;padding:12px;font-size:.75em;word-break:break-all;color:#ff6600;margin-top:8px;user-select:all;cursor:pointer}
.output-box:hover{border-color:#ff6600}
.output-label{font-size:.7em;color:#888;margin-bottom:4px}
</style>
</head>
<body>

<h1>Sprite Preview — Mobile</h1>
<p class="subtitle">Portrait (9:16) · Position sprites for mobile.html</p>

<div class="selector" id="selector"></div>
<p class="info" id="info-text"></p>

<div class="layout">
  <div class="scene-wrap" id="scene-wrap">
    <img class="scene-bg" id="scene-bg" src="" alt="background"/>
    <div class="sprite-anim" id="sprite-el"></div>
  </div>

  <div class="right-panel">
    <div class="controls">
      <div class="ctrl-group">
        <label>FPS: <span class="val" id="fps-val">12</span></label>
        <input type="range" id="fps-slider" min="1" max="20" value="12"/>
      </div>
      <div class="ctrl-group">
        <label>Left: <span class="val" id="left-val">10</span>%</label>
        <input type="range" id="left-slider" min="-30" max="100" value="10" step="0.1"/>
      </div>
      <div class="ctrl-group">
        <label>Top: <span class="val" id="top-val">40</span>%</label>
        <input type="range" id="top-slider" min="-10" max="100" value="40" step="0.1"/>
      </div>
      <div class="ctrl-group">
        <label>Scale: <span class="val" id="scale-val">30</span>%</label>
        <input type="range" id="scale-slider" min="5" max="100" value="30" step="0.5"/>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn" id="pause-btn" onclick="togglePause()">Pause</button>
      <button class="btn" onclick="stepFrame()">Step</button>
      <span id="frame-display" style="color:#888;font-size:.8em;">Frame: 1/6</span>
    </div>

    <div>
      <p class="output-label">CSS values (click to copy):</p>
      <div class="output-box" id="css-output" onclick="copyCSS()"></div>
    </div>

    <div>
      <p class="output-label">Individual Frames</p>
      <div class="frames-row" id="frames-row"></div>
    </div>
  </div>
</div>

<script>
'use strict';

const STATIONS = {
  1: {
    name: 'Cat (DMV Desk)',
    frames: 12,
    left: 42.3, top: 52, scale: 28,
    sprite: '../public/images/Station 1 sprite.png',
    bg: '../public/images/mobile/Station 1 background mobile.png'
  },
  2: {
    name: 'Cockatoo (Photo Booth)',
    frames: 12,
    left: 8.8, top: 61.2, scale: 35.5,
    sprite: '../public/images/Station 2 sprite.png',
    bg: '../public/images/mobile/Station 2 background mobile.png'
  },
  3: {
    name: 'Bulldog (Laminator)',
    frames: 12,
    left: -10.5, top: 44, scale: 48.5,
    sprite: '../public/images/Station 3 sprite.png',
    bg: '../public/images/mobile/Station 3 background mobile.png'
  },
  4: {
    name: 'Otter (Chip Station)',
    frames: 12,
    left: 5.7, top: 39.6, scale: 64.5,
    sprite: '../public/images/Station 4 sprite.png',
    bg: '../public/images/mobile/Station 5 background mobile.png'
  },
  5: {
    name: 'Rabbit (Checkout)',
    frames: 12,
    left: 49.6, top: 27.9, scale: 54.1,
    sprite: '../public/images/Station 5 sprite.png',
    bg: '../public/images/mobile/Station 6 background mobile.png'
  }
};

let current = 1;
let paused = false;
let frame = 0;
let fps = 12;
let animTimer = null;

const sceneWrap = document.getElementById('scene-wrap');
const sceneBg = document.getElementById('scene-bg');
const spriteEl = document.getElementById('sprite-el');
const selector = document.getElementById('selector');
const infoText = document.getElementById('info-text');
const fpsSlider = document.getElementById('fps-slider');
const leftSlider = document.getElementById('left-slider');
const topSlider = document.getElementById('top-slider');
const scaleSlider = document.getElementById('scale-slider');
const fpsVal = document.getElementById('fps-val');
const leftVal = document.getElementById('left-val');
const topVal = document.getElementById('top-val');
const scaleVal = document.getElementById('scale-val');
const frameDisplay = document.getElementById('frame-display');
const cssOutput = document.getElementById('css-output');
const framesRow = document.getElementById('frames-row');

// Build selector buttons
for (const [k, v] of Object.entries(STATIONS)) {
  const btn = document.createElement('button');
  btn.className = 'sel-btn';
  btn.textContent = 'Station ' + k;
  btn.onclick = () => selectStation(+k);
  selector.appendChild(btn);
}

function selectStation(n) {
  current = n;
  frame = 0;
  const s = STATIONS[n];

  // Update selector buttons
  document.querySelectorAll('.sel-btn').forEach((b, i) => b.classList.toggle('active', i + 1 === n));

  // Update info
  infoText.textContent = `${s.name} — ${s.frames} frames`;

  // Load background
  sceneBg.src = s.bg;

  // Load sprite sheet
  spriteEl.innerHTML = '';
  spriteEl.style.backgroundImage = `url('${s.sprite}')`;

  // Set sliders to current values
  leftSlider.value = s.left;
  topSlider.value = s.top;
  scaleSlider.value = s.scale;
  fpsSlider.value = fps;
  updateSliderLabels();
  updateSprite();
  buildFrameThumbs();
  restartAnim();
}

function updateSliderLabels() {
  leftVal.textContent = parseFloat(leftSlider.value).toFixed(1);
  topVal.textContent = parseFloat(topSlider.value).toFixed(1);
  scaleVal.textContent = parseFloat(scaleSlider.value).toFixed(1);
  fpsVal.textContent = fpsSlider.value;
  updateCSS();
}

function updateSprite() {
  const s = STATIONS[current];
  const left = parseFloat(leftSlider.value);
  const top = parseFloat(topSlider.value);
  const scale = parseFloat(scaleSlider.value);

  spriteEl.style.left = left + '%';
  spriteEl.style.top = top + '%';
  spriteEl.style.width = scale + '%';

  const wrapW = sceneWrap.offsetWidth;
  const spriteW = (scale / 100) * wrapW;
  spriteEl.style.aspectRatio = '1';
  spriteEl.style.backgroundSize = `${spriteW * s.frames}px auto`;
  spriteEl.style.backgroundPosition = `${-frame * spriteW}px 0`;
  spriteEl.style.backgroundRepeat = 'no-repeat';
  frameDisplay.textContent = `Frame: ${frame + 1}/${s.frames}`;
}

function updateCSS() {
  const left = parseFloat(leftSlider.value);
  const top = parseFloat(topSlider.value);
  const scale = parseFloat(scaleSlider.value);
  cssOutput.textContent = `left:${left}%; top:${top}%; width:${scale}%`;
}

function copyCSS() {
  navigator.clipboard.writeText(cssOutput.textContent).then(() => {
    const orig = cssOutput.style.borderColor;
    cssOutput.style.borderColor = '#00ff41';
    setTimeout(() => cssOutput.style.borderColor = orig, 600);
  });
}

function tickAnim() {
  if (paused) return;
  frame = (frame + 1) % STATIONS[current].frames;
  updateSprite();
}

function restartAnim() {
  clearInterval(animTimer);
  fps = parseInt(fpsSlider.value);
  animTimer = setInterval(tickAnim, 1000 / fps);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? 'Play' : 'Pause';
}

function stepFrame() {
  paused = true;
  document.getElementById('pause-btn').textContent = 'Play';
  frame = (frame + 1) % STATIONS[current].frames;
  updateSprite();
}

function buildFrameThumbs() {
  framesRow.innerHTML = '';
  const s = STATIONS[current];
  for (let i = 0; i < s.frames; i++) {
    const thumb = document.createElement('div');
    thumb.className = 'frame-thumb' + (i === frame ? ' active' : '');
    thumb.style.backgroundImage = `url('${s.sprite}')`;
    thumb.style.backgroundSize = `${s.frames * 70}px 70px`;
    thumb.style.backgroundPosition = `${-i * 70}px 0`;
    thumb.onclick = () => {
      frame = i;
      paused = true;
      document.getElementById('pause-btn').textContent = 'Play';
      updateSprite();
      document.querySelectorAll('.frame-thumb').forEach((t, j) => t.classList.toggle('active', j === i));
    };
    framesRow.appendChild(thumb);
  }
}

// Slider events
[leftSlider, topSlider, scaleSlider].forEach(sl => {
  sl.addEventListener('input', () => {
    updateSliderLabels();
    updateSprite();
    // Persist to station config
    STATIONS[current].left = parseFloat(leftSlider.value);
    STATIONS[current].top = parseFloat(topSlider.value);
    STATIONS[current].scale = parseFloat(scaleSlider.value);
  });
});
fpsSlider.addEventListener('input', () => {
  updateSliderLabels();
  restartAnim();
});

// Handle resize
window.addEventListener('resize', updateSprite);

// Init
selectStation(1);
</script>

</body>
</html>
