<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pixel Extractor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 10px; }
  #controls { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  #controls input, #controls button, #controls select { padding: 5px 10px; font-family: monospace; }
  #main { display: flex; gap: 20px; }
  #canvasWrap { position: relative; overflow: auto; border: 1px solid #444; max-width: 70vw; max-height: 80vh; }
  canvas { image-rendering: pixelated; cursor: crosshair; }
  #info { min-width: 300px; }
  #colorSwatch { width: 60px; height: 60px; border: 2px solid #fff; margin: 10px 0; }
  #gridOutput { width: 100%; height: 400px; background: #111; color: #0f0; font-size: 11px; padding: 5px; border: 1px solid #444; }
  .label { color: #aaa; margin-top: 8px; }
  #selectionBox { position: absolute; border: 2px dashed #ff0; pointer-events: none; display: none; }
  #gridPreview { margin-top: 10px; }
  #gridPreview canvas { border: 1px solid #666; }
</style>
</head>
<body>
<div id="controls">
  <input type="file" id="fileInput" accept="image/*">
  <label>Zoom: <select id="zoomLevel">
    <option value="1">1x</option>
    <option value="2">2x</option>
    <option value="4" selected>4x</option>
    <option value="8">8x</option>
    <option value="12">12x</option>
    <option value="16">16x</option>
  </select></label>
  <button id="btnSelect">Select Region</button>
  <button id="btnExtract">Extract Grid</button>
  <button id="btnCopy">Copy Output</button>
  <label>Grid W: <input type="number" id="gridW" value="22" style="width:50px"></label>
  <label>Grid H: <input type="number" id="gridH" value="28" style="width:50px"></label>
  <span id="coords" style="color:#ff0">x: - y: -</span>
</div>
<div id="main">
  <div id="canvasWrap">
    <canvas id="canvas"></canvas>
    <div id="selectionBox"></div>
  </div>
  <div id="info">
    <div class="label">Pixel Color:</div>
    <div id="colorSwatch"></div>
    <div id="colorHex">#------</div>
    <div id="colorRGB">rgb(-,-,-)</div>
    <div class="label">Selection:</div>
    <div id="selInfo">No selection</div>
    <div class="label">Extracted Grid (JS array):</div>
    <textarea id="gridOutput" readonly></textarea>
    <div id="gridPreview"><canvas id="previewCanvas"></canvas></div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');
const zoomLevel = document.getElementById('zoomLevel');
const coordsEl = document.getElementById('coords');
const swatchEl = document.getElementById('colorSwatch');
const hexEl = document.getElementById('colorHex');
const rgbEl = document.getElementById('colorRGB');
const selBox = document.getElementById('selectionBox');
const selInfo = document.getElementById('selInfo');
const gridOutput = document.getElementById('gridOutput');
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx = previewCanvas.getContext('2d');

let img = null;
let imgData = null;
let naturalW = 0, naturalH = 0;
let zoom = 4;
let selecting = false;
let selStart = null, selEnd = null;
let selRect = null;

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const i = new Image();
    i.onload = () => {
      img = i;
      naturalW = i.width;
      naturalH = i.height;
      drawImage();
    };
    i.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

zoomLevel.addEventListener('change', () => {
  zoom = parseInt(zoomLevel.value);
  if (img) drawImage();
});

function drawImage() {
  canvas.width = naturalW * zoom;
  canvas.height = naturalH * zoom;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  // Get pixel data at natural resolution
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = naturalW;
  tempCanvas.height = naturalH;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(img, 0, 0);
  imgData = tempCtx.getImageData(0, 0, naturalW, naturalH);
}

function getPixel(x, y) {
  if (!imgData || x < 0 || y < 0 || x >= naturalW || y >= naturalH) return null;
  const i = (y * naturalW + x) * 4;
  return {
    r: imgData.data[i],
    g: imgData.data[i+1],
    b: imgData.data[i+2],
    a: imgData.data[i+3]
  };
}

function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0').toUpperCase()).join('');
}

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const px = Math.floor((e.clientX - rect.left) / zoom);
  const py = Math.floor((e.clientY - rect.top) / zoom);
  coordsEl.textContent = `x: ${px} y: ${py}`;
  const pix = getPixel(px, py);
  if (pix) {
    const hex = rgbToHex(pix.r, pix.g, pix.b);
    swatchEl.style.background = hex;
    hexEl.textContent = hex;
    rgbEl.textContent = `rgb(${pix.r},${pix.g},${pix.b}) a:${pix.a}`;
  }
  if (selecting && selStart) {
    updateSelBox(e);
  }
});

let selectMode = false;
document.getElementById('btnSelect').addEventListener('click', () => {
  selectMode = !selectMode;
  document.getElementById('btnSelect').style.background = selectMode ? '#ff0' : '';
  document.getElementById('btnSelect').style.color = selectMode ? '#000' : '';
});

canvas.addEventListener('mousedown', (e) => {
  if (!selectMode) return;
  selecting = true;
  const rect = canvas.getBoundingClientRect();
  selStart = {
    x: Math.floor((e.clientX - rect.left) / zoom),
    y: Math.floor((e.clientY - rect.top) / zoom)
  };
  selBox.style.display = 'block';
});

canvas.addEventListener('mouseup', (e) => {
  if (!selecting) return;
  selecting = false;
  const rect = canvas.getBoundingClientRect();
  selEnd = {
    x: Math.floor((e.clientX - rect.left) / zoom),
    y: Math.floor((e.clientY - rect.top) / zoom)
  };
  selRect = {
    x: Math.min(selStart.x, selEnd.x),
    y: Math.min(selStart.y, selEnd.y),
    w: Math.abs(selEnd.x - selStart.x) + 1,
    h: Math.abs(selEnd.y - selStart.y) + 1
  };
  selInfo.textContent = `(${selRect.x},${selRect.y}) ${selRect.w}x${selRect.h}`;
  document.getElementById('gridW').value = selRect.w;
  document.getElementById('gridH').value = selRect.h;
});

function updateSelBox(e) {
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const sx = selStart.x * zoom;
  const sy = selStart.y * zoom;
  selBox.style.left = Math.min(sx, cx) + 'px';
  selBox.style.top = Math.min(sy, cy) + 'px';
  selBox.style.width = Math.abs(cx - sx) + 'px';
  selBox.style.height = Math.abs(cy - sy) + 'px';
}

document.getElementById('btnExtract').addEventListener('click', () => {
  if (!imgData) return;
  let sx, sy, gw, gh;
  if (selRect) {
    sx = selRect.x; sy = selRect.y;
    gw = selRect.w; gh = selRect.h;
  } else {
    sx = 0; sy = 0;
    gw = parseInt(document.getElementById('gridW').value);
    gh = parseInt(document.getElementById('gridH').value);
  }

  // Build palette and grid
  const palette = {};
  let palIdx = 0;
  const grid = [];

  for (let y = 0; y < gh; y++) {
    const row = [];
    for (let x = 0; x < gw; x++) {
      const pix = getPixel(sx + x, sy + y);
      if (!pix || pix.a < 128) {
        row.push('_');
      } else {
        const hex = rgbToHex(pix.r, pix.g, pix.b);
        if (!palette[hex]) {
          palette[hex] = `C${palIdx++}`;
        }
        row.push(palette[hex]);
      }
    }
    grid.push(row);
  }

  // Generate output
  let out = '// Palette\nconst _ = null;\n';
  for (const [hex, name] of Object.entries(palette)) {
    out += `const ${name} = '${hex}';\n`;
  }
  out += `\n// Sprite ${gw}x${gh}\nconst sprite = [\n`;
  for (let y = 0; y < grid.length; y++) {
    out += '  [' + grid[y].join(',') + '],\n';
  }
  out += '];\n';

  gridOutput.value = out;

  // Preview
  const scale = 4;
  previewCanvas.width = gw * scale;
  previewCanvas.height = gh * scale;
  previewCtx.imageSmoothingEnabled = false;
  previewCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
  for (let y = 0; y < gh; y++) {
    for (let x = 0; x < gw; x++) {
      const pix = getPixel(sx + x, sy + y);
      if (pix && pix.a >= 128) {
        previewCtx.fillStyle = rgbToHex(pix.r, pix.g, pix.b);
        previewCtx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
});

document.getElementById('btnCopy').addEventListener('click', () => {
  gridOutput.select();
  document.execCommand('copy');
});
</script>
</body>
</html>
