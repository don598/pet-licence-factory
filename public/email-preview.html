<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Email Preview — Pet Licence Factory</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    body { margin: 0; background: #d8e4f0; font-family: sans-serif; }
    .tabs { display: flex; gap: 0; padding: 16px 16px 0; }
    .tab { padding: 10px 24px; background: #c8b8e8; color: #223355; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 13px; }
    .tab.active { background: #f0f5ff; color: #0044cc; font-weight: 600; }
    .frame { border: none; width: 100%; height: calc(100vh - 56px); display: none; }
    .frame.active { display: block; }
  </style>
</head>
<body>
  <div class="tabs">
    <div class="tab active" onclick="show('confirm')">Order Confirmation</div>
    <div class="tab" onclick="show('stamp')">Stamp Mail Order</div>
    <div class="tab" onclick="show('shipping')">Shipping Notification</div>
  </div>
  <iframe class="frame active" id="confirm" srcdoc=""></iframe>
  <iframe class="frame" id="stamp" srcdoc=""></iframe>
  <iframe class="frame" id="shipping" srcdoc=""></iframe>

  <script>
    function show(id) {
      const ids = ['confirm','stamp','shipping'];
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ids[i] === id));
      document.querySelectorAll('.frame').forEach(f => f.classList.toggle('active', f.id === id));
    }

    const petFull = "Luna Whiskers";
    const orderId = "PLF-2026-DEMO1";
    const packLabel = "1-Pack Licence Sticker";
    const chipSize = "Mini";
    const total = "$29.99";
    const customerName = "Sarah Whiskers";
    const addrParts = "123 Pawsome Lane<br>Houston, TX 77054<br>United States";
    const trackingNumber = "9400111899228191993466";
    const trackUrl = `https://tools.usps.com/go/TrackConfirmAction?tLabels=${trackingNumber}`;
    const rabbitImg = `<img src="/images/rabbit-email.gif" width="80" height="80" alt="🐰" style="display:block;margin:0 auto 12px;image-rendering:pixelated;">`;
    const plfTitle = `<div style="font-family:'Press Start 2P','Courier New',monospace;font-size:20px;color:#0044cc;letter-spacing:3px;margin-bottom:20px;">PET LICENCE FACTORY</div>`;
    const gfont = `<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">`;

    function confirmHTML(shipLabel, isStamp) {
      return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">${gfont}</head>
<body style="margin:0;padding:0;background:#f0f5ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f0f5ff;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;background:#ffffff;border:2px solid #0066ff;border-radius:8px;overflow:hidden;">

        <tr><td style="padding:32px 32px 16px;text-align:center;background:linear-gradient(180deg,#eef4ff 0%,#ffffff 100%);">
          ${plfTitle}
          ${rabbitImg}
          <h1 style="margin:0;font-family:'Press Start 2P','Courier New',monospace;font-size:16px;color:#0077ff;letter-spacing:2px;text-transform:uppercase;">${isStamp ? 'Your Order Is On The Way!' : 'Order Confirmed!'}</h1>
          <p style="margin:12px 0 0;font-size:14px;color:#334477;line-height:1.5;">${petFull} is now the most official animal in the neighbourhood.</p>
        </td></tr>

        <tr><td style="padding:24px 32px 8px;">
          <div style="background:#f0f5ff;border:1px solid #0088cc;border-radius:4px;padding:14px 18px;">
            <div style="font-size:11px;color:#5577aa;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;">Your Order ID</div>
            <div style="font-family:'Courier New',monospace;font-size:14px;color:#0055cc;word-break:break-all;">${orderId}</div>
          </div>
        </td></tr>

        <tr><td style="padding:16px 32px;">
          <h2 style="margin:0 0 12px;font-size:13px;color:#0088cc;letter-spacing:1px;text-transform:uppercase;font-weight:600;">🧾 Order Summary</h2>
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="font-size:14px;color:#223355;border-collapse:collapse;">
            <tr><td style="padding:6px 0;border-bottom:1px dashed rgba(0,102,255,.15);">Item</td><td style="padding:6px 0;text-align:right;border-bottom:1px dashed rgba(0,102,255,.15);color:#0099cc;">${packLabel}</td></tr>
            <tr><td style="padding:6px 0;border-bottom:1px dashed rgba(0,102,255,.15);">Chip Size</td><td style="padding:6px 0;text-align:right;border-bottom:1px dashed rgba(0,102,255,.15);color:#0099cc;">${chipSize}</td></tr>
            <tr><td style="padding:6px 0;border-bottom:1px dashed rgba(0,102,255,.15);">Shipping</td><td style="padding:6px 0;text-align:right;border-bottom:1px dashed rgba(0,102,255,.15);color:#0099cc;">${shipLabel}</td></tr>
            <tr><td style="padding:12px 0 0;font-weight:700;color:#0077ff;">Total</td><td style="padding:12px 0 0;text-align:right;font-weight:700;color:#0077ff;font-size:16px;">${total}</td></tr>
          </table>
        </td></tr>

        <tr><td style="padding:16px 32px;">
          <h2 style="margin:0 0 12px;font-size:13px;color:#0088cc;letter-spacing:1px;text-transform:uppercase;font-weight:600;">📦 Shipping To</h2>
          <div style="background:#f0f5ff;border-left:3px solid #0077ff;padding:12px 16px;font-size:14px;color:#223355;line-height:1.6;">
            <strong style="color:#0099cc;">${customerName}</strong><br>${addrParts}
          </div>
        </td></tr>

        ${isStamp ? `<tr><td style="padding:0 32px 8px;">
          <div style="background:#f0f8ff;border:1px dashed #0099cc;border-radius:4px;padding:14px 18px;">
            <div style="font-size:12px;color:#0099cc;font-weight:700;margin-bottom:6px;">📮 Stamp Mail — No Tracking Number</div>
            <div style="font-size:13px;color:#223355;line-height:1.6;">Your order ships via USPS stamp mail. There's no tracking number with this option. If your licence hasn't arrived after <strong style="color:#0099cc;">21 days</strong> (most orders arrive in 3–5 days), email us at <a href="mailto:contact@creditcardart.com" style="color:#0055cc;">contact@creditcardart.com</a> and we'll make it right — free replacement included.</div>
          </div>
        </td></tr>` : ''}

        <tr><td style="padding:16px 32px 24px;">
          <h2 style="margin:0 0 12px;font-size:13px;color:#0088cc;letter-spacing:1px;text-transform:uppercase;font-weight:600;">⚡ What Happens Next</h2>
          ${isStamp ? `<ol style="margin:0;padding-left:20px;font-size:14px;color:#223355;line-height:1.8;">
            <li>🖨️ We print your custom licence sticker (2–3 business days).</li>
            <li>📮 We seal and stamp your envelope and drop it in the mail.</li>
            <li>📬 Keep an eye on your mailbox — stamp mail typically arrives in 3–5 business days.</li>
            <li>❓ Not arrived after 21 days? Email <a href="mailto:contact@creditcardart.com" style="color:#0055cc;">contact@creditcardart.com</a> and we'll sort it out.</li>
            <li>🏆 ${petFull} is the fastest animal in the neighborhood.</li>
          </ol>` : `<ol style="margin:0;padding-left:20px;font-size:14px;color:#223355;line-height:1.8;">
            <li>🖨️ We print your custom licence sticker (2–3 business days).</li>
            <li>📫 We carefully package it and ship it via your chosen method.</li>
            <li>📧 You get a follow-up email with tracking once it's in the mail.</li>
            <li>🏆 ${petFull} is the fastest animal in the neighborhood.</li>
          </ol>`}
        </td></tr>

        <tr><td style="padding:20px 32px;background:#f0f5ff;border-top:1px solid rgba(0,102,255,.15);text-align:center;font-size:12px;color:#6688aa;line-height:1.6;">
          Questions? Just reply to this email — we read every message.<br>
          <span style="opacity:.6;">Pet Licence Factory · 7900 Cambridge St, Apt 28-1G · Houston, TX 77054</span>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body></html>`;
    }

    document.getElementById('confirm').srcdoc = confirmHTML('Standard Shipping (7–14 business days)', false);
    document.getElementById('stamp').srcdoc   = confirmHTML('Stamp Mail (USPS)', true);

    document.getElementById('shipping').srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">${gfont}</head>
<body style="margin:0;padding:0;background:#f0f5ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f0f5ff;padding:24px 0;">
    <tr><td align="center">
      <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;background:#ffffff;border:2px solid #0066ff;border-radius:8px;overflow:hidden;">
        <tr><td style="padding:32px;text-align:center;background:linear-gradient(180deg,#eef4ff 0%,#ffffff 100%);">
          ${plfTitle}
          ${rabbitImg}
          <div style="font-size:32px;margin-bottom:8px;">📬</div>
          <h1 style="margin:0 0 8px;font-family:'Press Start 2P','Courier New',monospace;font-size:16px;color:#0077ff;letter-spacing:2px;text-transform:uppercase;">Shipped!</h1>
          <p style="margin:8px 0 24px;font-size:15px;color:#334477;line-height:1.5;">${petFull}'s licence just hit the mail stream.</p>
          <div style="background:#f0f5ff;border:1px solid #0088cc;border-radius:4px;padding:16px;margin:16px 0;text-align:left;">
            <div style="font-size:11px;color:#5577aa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">Tracking Number</div>
            <div style="font-family:'Courier New',monospace;font-size:15px;color:#0055cc;word-break:break-all;">${trackingNumber}</div>
            <div style="font-size:11px;color:#5577aa;text-transform:uppercase;letter-spacing:1px;margin:12px 0 4px;">Order</div>
            <div style="font-family:'Courier New',monospace;font-size:13px;color:#0055cc;">${orderId}</div>
          </div>
          <a href="${trackUrl}" style="display:inline-block;margin-top:12px;padding:14px 28px;background:#0077ff;color:#ffffff;text-decoration:none;border-radius:4px;font-weight:700;font-size:14px;letter-spacing:1px;">Track Package →</a>
        </td></tr>
        <tr><td style="padding:20px 32px;background:#f0f5ff;border-top:1px solid rgba(0,102,255,.15);text-align:center;font-size:12px;color:#6688aa;line-height:1.6;">
          Questions? Reply to this email any time.<br>
          <span style="opacity:.6;">Pet Licence Factory · Houston, TX</span>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body></html>`;
  </script>
</body>
</html>
