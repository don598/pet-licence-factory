<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pet Licence Factory — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Sacramento&display=swap" rel="stylesheet">
<!-- All DB ops go through admin-api serverless function -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #141414;
    --surface2:  #1c1c1c;
    --border:    #262626;
    --border2:   #333;
    --text:      #f2f2f2;
    --muted:     #777;
    --muted2:    #555;
    --blue:      #3b82f6;
    --blue-dim:  rgba(59,130,246,.12);
    --green:     #22c55e;
    --green-dim: rgba(34,197,94,.12);
    --red:       #ef4444;
    --red-dim:   rgba(239,68,68,.12);
    --amber:     #f59e0b;
    --radius:    10px;
    --radius-sm: 6px;
    --radius-pill: 999px;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  .topbar {
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }
  .topbar-logo {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.2px;
  }
  .topbar-logo span { color: var(--blue); }
  .topbar-sep { color: var(--muted2); }
  .topbar-status {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    padding: 4px 12px;
    background: var(--surface2);
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
  }
  .topbar-status.ok  { color: var(--green); background: var(--green-dim); border-color: rgba(34,197,94,.25); }
  .topbar-status.err { color: var(--red);   background: var(--red-dim);   border-color: rgba(239,68,68,.25); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Left panel ── */
  .panel-left {
    width: 240px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
  }
  .panel-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    padding: 14px 14px 8px;
  }
  .order-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
  }
  .order-list::-webkit-scrollbar { width: 4px; }
  .order-list::-webkit-scrollbar-track { background: transparent; }
  .order-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .order-card {
    padding: 10px 10px;
    border-radius: var(--radius-sm);
    margin-bottom: 3px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: background .12s, border-color .12s;
  }
  .order-card:hover  { background: var(--surface2); }
  .order-card.active { background: var(--blue-dim); border-color: rgba(59,130,246,.3); }
  .order-card-id {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .order-card-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
  }
  .order-card-meta {
    font-size: 11px;
    color: var(--muted);
  }
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .3px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: var(--radius-pill);
    margin-top: 6px;
  }
  .badge-pending   { background: rgba(245,158,11,.15); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .badge-processed { background: var(--green-dim); color: var(--green); border: 1px solid rgba(34,197,94,.3); }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted2);
    padding: 10px 10px 4px;
    letter-spacing: .3px;
  }
  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  .panel-footer {
    padding: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background .12s, border-color .12s, opacity .12s;
    width: 100%;
    white-space: nowrap;
  }
  .btn:hover   { background: #242424; border-color: #3a3a3a; }
  .btn:active  { opacity: .8; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-blue    { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn-blue:hover { background: #2563eb; border-color: #2563eb; }
  .btn-green   { background: var(--green); border-color: var(--green); color: #fff; }
  .btn-green:hover { background: #16a34a; border-color: #16a34a; }
  .btn-red     { background: var(--red-dim); border-color: rgba(239,68,68,.4); color: var(--red); }
  .btn-red:hover { background: rgba(239,68,68,.2); }
  .btn-ghost   { background: transparent; border-color: transparent; color: var(--muted); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: var(--border); }
  .btn-sm      { font-size: 11px; padding: 5px 10px; }

  /* ── Centre canvas area ── */
  .panel-centre {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: #0f0f0f;
  }

  .canvas-toolbar {
    height: 42px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 4px;
    flex-shrink: 0;
  }
  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 6px;
    border-right: 1px solid var(--border);
  }
  .toolbar-group:last-child { border-right: none; }
  .tb-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    transition: background .1s, color .1s;
  }
  .tb-btn:hover  { background: var(--surface2); color: var(--text); }
  .tb-btn.active { background: var(--blue-dim); color: var(--blue); }
  .tb-input {
    width: 44px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    padding: 3px 6px;
    text-align: center;
  }
  .tb-color {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    padding: 2px;
    background: transparent;
    cursor: pointer;
  }

  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    padding: 24px;
  }
  .canvas-stage {
    position: relative;
    box-shadow: 0 0 0 1px var(--border), 0 8px 40px rgba(0,0,0,.6);
    border-radius: 3px;
    overflow: hidden;
  }
  /* Template image sits behind the Fabric canvas */
  #templateImg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
    pointer-events: none;
  }
  #fabricCanvas {
    position: relative;
    display: block;
  }

  /* ── Right panel ── */
  .panel-right {
    width: 260px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .panel-right::-webkit-scrollbar { width: 4px; }
  .panel-right::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .tool-section {
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .tool-section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .info-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
  }
  .info-label { color: var(--muted); font-size: 11px; white-space: nowrap; }
  .info-value { font-size: 12px; font-weight: 500; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .info-value.status-pending   { color: var(--amber); }
  .info-value.status-processed { color: var(--green); }

  .photo-upload-area {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: border-color .12s, background .12s;
    margin-bottom: 8px;
    position: relative;
  }
  .photo-upload-area:hover { border-color: var(--blue); background: var(--blue-dim); color: var(--blue); }
  .photo-upload-area input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .photo-upload-icon { font-size: 20px; margin-bottom: 4px; display: block; }

  .bg-status {
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    min-height: 16px;
    margin: 6px 0;
  }

  .export-radios {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  .export-radio-label {
    flex: 1;
    text-align: center;
    padding: 5px 4px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border2);
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all .12s;
  }
  .export-radio-label:has(input:checked) {
    background: var(--blue-dim);
    border-color: rgba(59,130,246,.4);
    color: var(--blue);
  }
  .export-radio-label input { display: none; }

  .shortcuts-list { display: flex; flex-direction: column; gap: 3px; }
  .shortcut-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
  .shortcut-key {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10px;
    color: var(--muted);
    font-family: monospace;
  }
  .shortcut-desc { color: var(--muted); }

  /* ── Modals ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 24px;
    width: 440px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,.6);
  }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-textarea {
    width: 100%;
    height: 160px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: monospace;
    font-size: 11px;
    padding: 10px;
    resize: vertical;
  }
  .modal-error { font-size: 11px; color: var(--red); min-height: 14px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions .btn { width: auto; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <span class="topbar-logo">Pet Licence Factory <span>Admin</span></span>
  <span class="topbar-sep">/</span>
  <span id="statusBar" class="topbar-status">Ready</span>
</div>

<div class="layout">

  <!-- ── Left: Order Queue ── -->
  <div class="panel-left">
    <div class="panel-title">Orders <span id="pendingCount" style="color:var(--blue)"></span></div>
    <div class="order-list" id="orderList"></div>
    <div class="panel-footer">
      <button class="btn btn-sm" id="btnAddSample">+ Add sample order</button>
      <button class="btn btn-sm" id="btnPasteJson">Paste JSON</button>
      <button class="btn btn-sm btn-red" id="btnClearAll">Clear all</button>
    </div>
  </div>

  <!-- ── Centre: Canvas editor ── -->
  <div class="panel-centre">
    <div class="canvas-toolbar">
      <div class="toolbar-group">
        <span style="font-size:11px;color:var(--muted);margin-right:2px;">Size</span>
        <input class="tb-input" id="tbFontSize" type="number" value="14" min="4" max="120">
        <button class="tb-btn" id="tbSizeUp" title="Increase">+</button>
        <button class="tb-btn" id="tbSizeDown" title="Decrease">−</button>
      </div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tbBold" title="Bold"><b>B</b></button>
        <button class="tb-btn" id="tbItalic" title="Italic"><i>I</i></button>
      </div>
      <div class="toolbar-group">
        <input class="tb-color" id="tbColor" type="color" value="#1a0a00" title="Text color">
      </div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tbAlignL" title="Left">⬤≡</button>
        <button class="tb-btn" id="tbAlignC" title="Center">≡</button>
        <button class="tb-btn" id="tbAlignR" title="Right">≡⬤</button>
      </div>
      <div class="toolbar-group">
        <button class="tb-btn" id="tbDelete" title="Delete selected">✕</button>
        <button class="tb-btn" id="tbReset" title="Reset fields">↺</button>
        <button class="tb-btn" id="tbGrid" title="Toggle grid">⊞</button>
      </div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
      <div class="canvas-stage" id="canvasStage">
        <img id="templateImg" src="TEMPLATE_PLACEHOLDER" alt="Licence template">
        <canvas id="fabricCanvas"></canvas>
      </div>
    </div>
  </div>

  <!-- ── Right: Tools ── -->
  <div class="panel-right">

    <!-- Order info -->
    <div class="tool-section">
      <div class="tool-section-title">Order Info</div>
      <div class="info-grid">
        <span class="info-label">ID</span>       <span class="info-value" id="infoId">—</span>
        <span class="info-label">Name</span>     <span class="info-value" id="infoName">—</span>
        <span class="info-label">Date</span>     <span class="info-value" id="infoDate">—</span>
        <span class="info-label">Pack</span>     <span class="info-value" id="infoPack">—</span>
        <span class="info-label">Total</span>    <span class="info-value" id="infoTotal">—</span>
        <span class="info-label">Status</span>   <span class="info-value" id="infoStatus">—</span>
      </div>
    </div>

    <!-- Photo -->
    <div class="tool-section">
      <div class="tool-section-title">Photo</div>
      <label class="photo-upload-area" id="photoDropArea">
        <span class="photo-upload-icon">📷</span>
        Click or drop to upload photo
        <input type="file" id="photoInput" accept="image/*">
      </label>
      <button class="btn btn-sm" id="btnRemoveBg" style="margin-bottom:6px;">✦ Remove background</button>
      <div class="bg-status" id="bgStatus">Ready</div>
      <button class="btn btn-sm btn-red" id="btnResetPhoto">Reset photo</button>
    </div>

    <!-- Export -->
    <div class="tool-section">
      <div class="tool-section-title">Export</div>
      <div class="export-radios">
        <label class="export-radio-label"><input type="radio" name="exportQ" value="1"> 1× Screen</label>
        <label class="export-radio-label"><input type="radio" name="exportQ" value="2" checked> 2× Print</label>
        <label class="export-radio-label"><input type="radio" name="exportQ" value="3"> 3× Hi‑Res</label>
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <button class="btn btn-green" id="btnDownload">↓ Download PNG</button>
        <button class="btn" id="btnProcess">✓ Mark processed</button>
        <button class="btn btn-blue" id="btnDlProcess">↓ Download + Process</button>
      </div>
    </div>

    <!-- Shortcuts -->
    <div class="tool-section">
      <div class="tool-section-title">Shortcuts</div>
      <div class="shortcuts-list">
        <div class="shortcut-row"><span class="shortcut-desc">Delete object</span><span class="shortcut-key">Del</span></div>
        <div class="shortcut-row"><span class="shortcut-desc">Deselect</span><span class="shortcut-key">Esc</span></div>
        <div class="shortcut-row"><span class="shortcut-desc">Undo / Redo</span><span class="shortcut-key">⌘Z / ⌘Y</span></div>
        <div class="shortcut-row"><span class="shortcut-desc">Nudge 1px</span><span class="shortcut-key">↑↓←→</span></div>
      </div>
    </div>

  </div>
</div>

<!-- Modal: Paste JSON -->
<div class="modal-overlay" id="pasteModal">
  <div class="modal-box">
    <div class="modal-title">Paste order JSON</div>
    <textarea class="modal-textarea" id="pasteTextarea" placeholder='[{"orderId":"PLF-001","petFirstName":"BISCUIT",...}]'></textarea>
    <div class="modal-error" id="pasteError"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="btnPasteCancel">Cancel</button>
      <button class="btn btn-blue btn-sm" id="btnPasteConfirm">Import</button>
    </div>
  </div>
</div>

<!-- Modal: Confirm -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" style="width:340px;">
    <div class="modal-title" id="confirmText">Are you sure?</div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" id="btnConfirmNo">Cancel</button>
      <button class="btn btn-red btn-sm" id="btnConfirmYes">Confirm</button>
    </div>
  </div>
</div>

<script>
// =====================================================================
// CONSTANTS
// =====================================================================
const TW = 1322, TH = 957;

// Field coordinates (calibrated from Card With Placeholders.png)
const F = {
  dlNumber:   {x:439, y:197, w:257, h:61},
  expDate:    {x:719, y:200, w:243, h:41},
  issDate:    {x:719, y:241, w:243, h:41},
  dob:        {x:472, y:263, w:189, h:60},
  firstName:  {x:374, y:333, w:345, h:80},
  lastName:   {x:374, y:413, w:345, h:79},
  addrLine1:  {x:374, y:531, w:325, h:41},
  addrLine2:  {x:374, y:572, w:325, h:41},
  signature:  {x:1027,y:591, w:176, h:64},
  height:     {x:747, y:625, w:109, h:48},
  sex:        {x:435, y:626, w:65,  h:48},
  weight:     {x:496, y:683, w:53,  h:47},
  eyes:       {x:718, y:683, w:76,  h:47},
  licClass:   {x:476, y:737, w:62,  h:48},
  restrict:   {x:856, y:737, w:71,  h:48},
  photoMain:  {x:971, y:222, w:285, h:433},
  photoWmark: {x:62,  y:834, w:138, h:120}
};

// =====================================================================
// ADMIN API (server-side — no secrets in frontend)
// =====================================================================
let adminToken = sessionStorage.getItem('plf_admin_token');

async function adminAPI(action, params = {}) {
  const res = await fetch('/api/admin-api', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(adminToken ? { 'Authorization': 'Bearer ' + adminToken } : {}),
    },
    body: JSON.stringify({ action, ...params }),
  });
  if (res.status === 401 && action !== 'login') {
    sessionStorage.removeItem('plf_admin_token');
    adminToken = null;
    location.reload();
    throw new Error('Session expired');
  }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'API error');
  return data;
}

function isTokenValid() {
  if (!adminToken) return false;
  try {
    const payload = JSON.parse(atob(adminToken.split('.')[1]));
    return payload.exp * 1000 > Date.now();
  } catch { return false; }

  if (type) statusTimer = setTimeout(() => { el.textContent = 'Ready'; el.className = 'topbar-status'; }, 3000);
}
function statusBg(msg) {

// =====================================================================
async function loadOrders() {
  try {
    const res = await adminAPI('list_orders');
    return (res.orders || []).map(dbRowToOrder);
  } catch (err) { console.error('loadOrders:', err); return []; }
}

async function addOrder(orderData) {
  // Manual order entry not supported via admin API — orders come from checkout flow
  console.warn('addOrder: use the checkout flow to create orders');
  return null;
}

async function updateOrder(orderId, patch) {
  // Find the DB id for this order_id
  try {
    const res = await adminAPI('list_orders');
    const row = (res.orders || []).find(o => o.order_id === orderId);
    if (!row) { console.error('updateOrder: order not found'); return; }
    const updates = {};
    if (patch.status !== undefined) updates.status = patch.status;
    if (patch.trackingNumber !== undefined) updates.tracking_number = patch.trackingNumber;
    if (patch.notes !== undefined) updates.notes = patch.notes;
    await adminAPI('update_order', { id: row.id, updates });
  } catch (err) { console.error('updateOrder:', err); }
}

// =====================================================================
// CANVAS INIT + RESIZE
// =====================================================================
function initCanvas() {
  // Set template image source
  document.getElementById('templateImg').src = TEMPLATE_DATA_URL;

  canvas = new fabric.Canvas('fabricCanvas', {
    width: TW, height: TH,
    backgroundColor: 'rgba(0,0,0,0)',
    preserveObjectStacking: true,
    selection: true
  });

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  canvas.on('object:modified', saveHistory);
  canvas.on('object:added',    saveHistory);
  canvas.on('selection:created',  updateToolbar);
  canvas.on('selection:updated',  updateToolbar);
  canvas.on('selection:cleared',  updateToolbar);

  document.addEventListener('keydown', handleKeyboard);
}

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  const aw = wrap.clientWidth  - 48;
  const ah = wrap.clientHeight - 48;
  const scale = Math.min(aw / TW, ah / TH);
  canvasScale = scale;

  const stageW = Math.round(TW * scale);
  const stageH = Math.round(TH * scale);

  const stage = document.getElementById('canvasStage');
  stage.style.width  = stageW + 'px';
  stage.style.height = stageH + 'px';

  canvas.setZoom(scale);
  // setDimensions updates canvas element size to match zoomed view
  canvas.setDimensions({ width: stageW, height: stageH });
  canvas.renderAll();
}

// =====================================================================
// HISTORY
// =====================================================================
function saveHistory() {
  canvasHistory = canvasHistory.slice(0, historyIndex + 1);
  canvasHistory.push(JSON.stringify(canvas.toJSON(['name'])));
  if (canvasHistory.length > 20) canvasHistory.shift(); else historyIndex++;
}
function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  canvas.loadFromJSON(canvasHistory[historyIndex], () => {
    restoreObjectRefs(); canvas.renderAll();
  });
}
function redo() {
  if (historyIndex >= canvasHistory.length - 1) return;
  historyIndex++;
  canvas.loadFromJSON(canvasHistory[historyIndex], () => {
    restoreObjectRefs(); canvas.renderAll();
  });
}
function restoreObjectRefs() {
  fabricObjects = {};
  canvas.getObjects().forEach(obj => {
    if (obj.name) fabricObjects[obj.name] = obj;
  });
}

// =====================================================================
// LOAD ORDER
// =====================================================================
function loadOrderToCanvas(order) {
  currentOrder = order;
  currentPhotoDataUrl = order.photo || null;

  // Remove all objects (keep nothing)
  canvas.clear();
  canvasHistory = []; historyIndex = -1; fabricObjects = {};

  // Build field mapping
  const fm = {
    dlNumber:  order.dlNumber || '',
    expDate:   order.expDate  || '',
    issDate:   order.issDate  || '',
    dob:       order.dob      || '',
    firstName: order.petFirstName || '',
    lastName:  order.petLastName  || '',
    addrLine1: order.addrLine1 || '',
    addrLine2: order.addrLine2 || '',
    signature: order.signature || '',
    height:    order.height    || '',
    sex:       order.sex       || '',
    weight:    order.weight    || '',
    eyes:      order.eyes      || '',
    licClass:  order.licClass  || '',
    restrict:  order.restrict  || ''
  };

  Object.entries(fm).forEach(([k, v]) => createTextField(k, v));
  createPhotoZone('photoMain',  currentPhotoDataUrl, false);
  createPhotoZone('photoWmark', currentPhotoDataUrl, true);

  canvas.renderAll();

  // Update info panel
  document.getElementById('infoId').textContent    = order.orderId  || '—';
  document.getElementById('infoName').textContent  = [order.petFirstName, order.petLastName].filter(Boolean).join(' ') || '—';
  document.getElementById('infoDate').textContent  = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : '—';
  document.getElementById('infoPack').textContent  = order.packCount || '—';
  document.getElementById('infoTotal').textContent = order.total     || '—';
  const statusEl = document.getElementById('infoStatus');
  statusEl.textContent  = (order.status || '—').toUpperCase();
  statusEl.className    = 'info-value status-' + (order.status || '');

  refreshQueue();

  // Highlight active card
  document.querySelectorAll('.order-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === order.orderId);
  });
}

// =====================================================================
// TEXT FIELDS
// =====================================================================
function createTextField(fieldName, value) {
  const field = F[fieldName];
  if (!field) return;
  const isSig = fieldName === 'signature';
  const isDob = fieldName === 'dob';

  const text = new fabric.IText(value, {
    name:       fieldName,
    left:       field.x,
    top:        field.y,
    fontSize:   Math.max(8, field.h * 0.45),
    fontFamily: isSig ? 'Sacramento' : 'Arial, sans-serif',
    fontWeight: isSig ? 'normal' : 'bold',
    fill:       isDob ? '#c0200a' : '#1a0a00',
    selectable: true,
    editable:   true,
    width:      field.w,
    textAlign:  isSig ? 'right' : 'left'
  });
  canvas.add(text);
  fabricObjects[fieldName] = text;
}

// =====================================================================
// PHOTO ZONES
// =====================================================================
function createPhotoZone(zoneName, photoUrl, isWatermark) {
  const field = F[zoneName];
  if (!field) return;

  if (photoUrl) {
    fabric.Image.fromURL(photoUrl, img => {
      const scale = Math.min(field.w / img.width, field.h / img.height);
      img.set({
        left: field.x, top: field.y,
        scaleX: scale, scaleY: scale,
        opacity: isWatermark ? 0.2 : 1,
        selectable: true, hasControls: true, name: zoneName
      });
      canvas.add(img);
      fabricObjects[zoneName] = img;
      canvas.renderAll();
    });
  } else {
    // Dashed placeholder rect
    const rect = new fabric.Rect({
      left: field.x, top: field.y,
      width: field.w, height: field.h,
      fill: 'transparent', stroke: 'rgba(59,130,246,0.4)',
      strokeDashArray: [6,4], strokeWidth: 1.5,
      selectable: false, evented: false, name: zoneName
    });
    canvas.add(rect);
    fabricObjects[zoneName] = rect;
  }
}

function loadPhotoToCanvas(photoUrl) {
  ['photoMain', 'photoWmark'].forEach(n => {
    const obj = fabricObjects[n]; if (obj) { canvas.remove(obj); delete fabricObjects[n]; }
  });
  createPhotoZone('photoMain',  photoUrl, false);
  createPhotoZone('photoWmark', photoUrl, true);
  canvas.renderAll();
}

// =====================================================================
// TOOLBAR
// =====================================================================
function updateToolbar() {
  const obj = canvas.getActiveObject();
  if (!obj) return;
  if (obj.type === 'i-text' || obj.type === 'text') {
    document.getElementById('tbFontSize').value = Math.round(obj.fontSize || 14);

}

function withActiveText(fn) {

}

// =====================================================================
// GRID
// =====================================================================
function toggleGrid() {
  gridVisible = !gridVisible;
  document.getElementById('tbGrid').classList.toggle('active', gridVisible);
  canvas.getObjects().filter(o => o.name === '_grid').forEach(o => canvas.remove(o));
  if (!gridVisible) { canvas.renderAll(); return; }
  const step = 50;
  for (let x = 0; x <= TW; x += step) {
    canvas.add(new fabric.Line([x,0,x,TH], {stroke:'rgba(59,130,246,.15)',strokeWidth:1,selectable:false,evented:false,name:'_grid'}));
  }
  for (let y = 0; y <= TH; y += step) {
    canvas.add(new fabric.Line([0,y,TW,y], {stroke:'rgba(59,130,246,.15)',strokeWidth:1,selectable:false,evented:false,name:'_grid'}));
  }
  canvas.renderAll();
}

// =====================================================================
// KEYBOARD
// =====================================================================
function handleKeyboard(e) {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;
  const obj = canvas.getActiveObject();
  if (e.key === 'Delete' || e.key === 'Backspace') {
    if (obj && !obj.isEditing) { e.preventDefault(); canvas.remove(obj); canvas.renderAll(); }
  } else if (e.key === 'Escape') {
    canvas.discardActiveObject(); canvas.renderAll();
  } else if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
    e.preventDefault(); e.shiftKey ? redo() : undo();
  } else if ((e.metaKey || e.ctrlKey) && e.key === 'y') {
    e.preventDefault(); redo();
  } else if (e.key.startsWith('Arrow') && obj) {
    e.preventDefault();
    if (e.key==='ArrowUp')    obj.top--;
    if (e.key==='ArrowDown')  obj.top++;
    if (e.key==='ArrowLeft')  obj.left--;
    if (e.key==='ArrowRight') obj.left++;
    canvas.renderAll(); saveHistory();
  }
}

document.getElementById('btnRemoveBg').addEventListener('click', async () => {
  if (!currentPhotoDataUrl) { setStatus('No photo loaded', 'err'); return; }
  statusBg('Loading AI model…');
  document.getElementById('btnRemoveBg').disabled = true;
  try {
    const mod = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.1.20/dist/browser.mjs');
    const removeBg = mod.removeBackground || mod.default?.removeBackground;
    const res  = await fetch(currentPhotoDataUrl);
    const blob = await res.blob();
    statusBg('Removing background…');
    const out  = await removeBg(blob, { debug:false, publicPath:'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.1.20/dist/' });
    currentPhotoDataUrl = URL.createObjectURL(out);
    loadPhotoToCanvas(currentPhotoDataUrl);
    statusBg('✓ Background removed');
    setStatus('Background removed', 'ok');
  } catch(err) {
    statusBg('Error: ' + err.message);
    setStatus('BG removal failed', 'err');
  } finally {
    document.getElementById('btnRemoveBg').disabled = false;
  }
});

});

// =====================================================================
// EXPORT (composite: template img + fabric canvas)
// =====================================================================
async function exportPng() {
  if (!currentOrder) { setStatus('No order loaded', 'err'); return; }

  const quality = parseInt(document.querySelector('input[name="exportQ"]:checked').value);
  const W = TW * quality, H = TH * quality;

  // Composite canvas
  const comp = document.createElement('canvas');
  comp.width = W; comp.height = H;
  const ctx = comp.getContext('2d');

  // 1. Draw the template background image
  const tmplImg = document.getElementById('templateImg');
  ctx.drawImage(tmplImg, 0, 0, W, H);

  // 2. Export Fabric canvas at native resolution (zoom=1), draw on top
  const savedZoom = canvas.getZoom();
  const savedW    = canvas.getWidth();
  const savedH    = canvas.getHeight();
  canvas.setZoom(1);
  canvas.setDimensions({ width: TW, height: TH });
  const fabricPng = canvas.toDataURL({ format:'png', quality:1, multiplier: quality });
  canvas.setZoom(savedZoom);
  canvas.setDimensions({ width: savedW, height: savedH });
  canvas.renderAll();

  await new Promise(res => {
    const img = new Image();
    img.onload = () => { ctx.drawImage(img, 0, 0, W, H); res(); };
    img.src = fabricPng;
  });

  // 3. Download
  const link = document.createElement('a');
  link.download = `PLF-${currentOrder.orderId}-${currentOrder.petFirstName || 'order'}.png`;
  link.href = comp.toDataURL('image/png');
  link.click();
  setStatus('PNG downloaded', 'ok');
}

document.getElementById('btnDownload').addEventListener('click', exportPng);
document.getElementById('btnDlProcess').addEventListener('click', async () => {
  await exportPng(); markProcessed();

// =====================================================================
// MARK PROCESSED
// =====================================================================
async function markProcessed() {
  if (!currentOrder) { setStatus('No order loaded', 'err'); return; }
  await updateOrder(currentOrder.orderId, { status: 'processed' });
  currentOrder.status = 'processed';

  const statusEl = document.getElementById('infoStatus');
  statusEl.textContent = 'PROCESSED'; statusEl.className = 'info-value status-processed';

  window.parent.postMessage({ type: 'PLF_ORDER_PROCESSED', orderId: currentOrder.orderId }, '*');
  if (typeof bubble_fn_orderProcessed === 'function') bubble_fn_orderProcessed(currentOrder.orderId);

  refreshQueue();
  setStatus('Order marked as processed', 'ok');
}
document.getElementById('btnProcess').addEventListener('click', markProcessed);

// =====================================================================
// ORDER QUEUE
// =====================================================================
async function refreshQueue() {
  const orders = await loadOrders();
  const pending   = orders.filter(o => o.status !== 'processed');
  const processed = orders.filter(o => o.status === 'processed');
  document.getElementById('pendingCount').textContent = pending.length ? pending.length : '';

  const list = document.getElementById('orderList');
  list.innerHTML = '';

  if (pending.length) {
    const sec = document.createElement('div');
    sec.className = 'section-label'; sec.textContent = 'Pending';
    list.appendChild(sec);
    pending.forEach(o => list.appendChild(makeOrderCard(o)));
  }
  if (processed.length) {
    const d = document.createElement('div'); d.className = 'divider';
    list.appendChild(d);
    const sec = document.createElement('div');
    sec.className = 'section-label'; sec.textContent = 'Processed (' + processed.length + ')';
    list.appendChild(sec);
    processed.forEach(o => list.appendChild(makeOrderCard(o)));
  }

  if (currentOrder) {
    document.querySelectorAll('.order-card').forEach(c => {
      c.classList.toggle('active', c.dataset.id === currentOrder.orderId);
    });
  }
  return orders;
}

function makeOrderCard(order) {
  const card = document.createElement('div');
  card.className = 'order-card';
  card.dataset.id = order.orderId;
  const name = [order.petFirstName, order.petLastName].filter(Boolean).join(' ') || 'Unknown';
  const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString() : '';
  card.innerHTML = `
    <div class="order-card-id">${order.orderId}</div>
    <div class="order-card-name">${name}</div>
    <div class="order-card-meta">Pack ${order.packCount||1} &middot; ${order.total||''} &middot; ${date}</div>
    <span class="badge badge-${order.status}">${order.status}</span>
  `;
  card.addEventListener('click', () => loadOrderToCanvas(order));
  return card;
}

// POSTMESSAGE (Bubble.io)
// =====================================================================
window.addEventListener('message', e => {
  if (e.data?.type === 'PLF_ADMIN_ORDERS' && Array.isArray(e.data.orders)) {
    const existing = loadOrders();
    e.data.orders.forEach(o => {
      if (!existing.find(x => x.orderId === o.orderId)) addOrder(o);
    });
    refreshQueue();
    setStatus(`Received ${e.data.orders.length} order(s)`, 'ok');
  }
});

// =====================================================================
// BOOT
// =====================================================================
document.addEventListener('DOMContentLoaded', async () => {
  // Auth gate — require login before loading anything
  if (!isTokenValid()) {
    sessionStorage.removeItem('plf_admin_token');
    adminToken = null;
    // Show a simple login prompt
    const pw = prompt('Admin password:');
    if (pw) {
      try {
        const { token } = await adminAPI('login', { password: pw });
        adminToken = token;
        sessionStorage.setItem('plf_admin_token', token);
      } catch {
        document.body.innerHTML = '<h2 style="color:#f44;padding:40px;font-family:sans-serif">Access denied. Reload to try again.</h2>';
        return;
      }
    } else {
      document.body.innerHTML = '<h2 style="color:#f44;padding:40px;font-family:sans-serif">Access denied. Reload to try again.</h2>';
      return;
    }
  }

  initCanvas();
  const orders = await refreshQueue();
  const first = orders.find(o => o.status !== 'processed');
  if (first) loadOrderToCanvas(first);
  setStatus('Connected', 'ok');

  // Poll for new orders every 30 seconds (replaces realtime subscription)
  setInterval(refreshQueue, 30000);
});
